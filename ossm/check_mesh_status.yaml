# Evaluation data for check_mesh_status


- conversation_group_id: check_mesh_status
  tag: check_mesh_Status
  description: "Check the status of the mesh and identify any issues."

  turns:
    - turn_id: diagnose
      query: >
        Check the status of the mesh and identify any issues.
      expected_response: >
        The agent should report the current health status of the Istio service mesh
        by querying Kiali. It should identify the overall mesh health and list any
        namespaces or services that are degraded, with a warning or error status,
        or confirm that all components are healthy.
      turn_metrics:
        - custom:answer_correctness
