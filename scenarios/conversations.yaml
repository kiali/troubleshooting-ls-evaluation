# Evaluation conversations for Kiali + LightSpeed troubleshooting evaluation.
#
# tool_calls: null  →  populated at runtime by the API, never pre-fill
#
# expected_tool_calls format:
#   Simple (one tool):        - - tool_name: foo
#   With alternatives:        - - - tool_name: foo   (alt1, seq1, tool1)
#                               - - tool_name: bar   (alt1, seq2, tool1)
#                             - - - tool_name: baz   (alt2, seq1, tool1)
#
# system.yaml: full_match: false (extra tool calls allowed), ordered: false
# Script paths are resolved relative to this file's location.


# ── fix_bookinfo_routing ──────────────────────────────────────────────────────
- conversation_group_id: fix_bookinfo_routing
  tag: fix_bookinfo_routing
  description: "Multi-turn: reviews-v3 has weight 0 so never gets traffic. Agent investigates, identifies the routing issue, and fixes weights."

  conversation_metrics:
    - geval:troubleshooting_continuity       # agent references findings across turns
    - deepeval:conversation_relevancy        # agent stays on-topic throughout
    - deepeval:knowledge_retention           # agent remembers evidence from earlier turns
    - deepeval:conversation_completeness     # user's intent (investigate + fix) was fully addressed

  turns:
    - turn_id: investigate
      query: >
        In our Bookinfo app, the product page only ever shows black or no stars —
        it never shows red stars. All Istio resources and services are deployed
        in the 'bookinfo' namespace. Can you investigate and tell me what you find?
        Please only report for now, do not make any changes yet.
      expected_response: >
        The agent should investigate the Bookinfo routing and identify that the
        reviews VirtualService in the bookinfo namespace has a weight of 0 for
        reviews-v3, meaning reviews-v3 is intentionally excluded from receiving
        traffic by the Istio routing rules. The agent may observe that the traffic
        graph shows some recent traffic to reviews-v3 (due to the metrics window)
        but should ultimately point to the VirtualService configuration as the
        source of the routing problem. The agent should report that reviews-v1 and
        reviews-v2 receive traffic while reviews-v3 is configured to receive none.
      tool_calls: null
      expected_tool_calls:
        - # Alternative 1: traffic graph
          - - tool_name: kiali_get_mesh_traffic_graph
              arguments:
                namespaces: bookinfo
        - # Alternative 2: mesh status
          - - tool_name: kiali_get_mesh_status
        - # Alternative 3: list Istio configs
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: list
        - # Alternative 4: get reviews VirtualService directly
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                action: get
                group: networking.istio.io
                kind: VirtualService
                namespace: bookinfo
                version: v1
                object: reviews
      expected_keywords:
        - - reviews
          - traffic
        - - reviews
          - routing
      turn_metrics:
        - custom:answer_correctness
        - custom:keywords_eval

    - turn_id: diagnose
      query: >
        What is the exact root cause? Can you check the Istio routing configuration
        for the reviews service in the bookinfo namespace?
      expected_response: >
        The root cause is the reviews VirtualService in the bookinfo namespace:
        it explicitly sets the weight for reviews-v3 to 0 (or omits it entirely,
        which defaults to 0), routing all traffic to reviews-v1 and reviews-v2.
        Because reviews-v3 is the only version that renders red stars, it never
        serves requests and users never see red stars. The agent should clearly
        identify the VirtualService routing weights as the root cause — not any
        issue with the ratings service, missing deployments, or mTLS configuration.
      tool_calls: null
      expected_tool_calls:
        - # Alternative 1: list then get VirtualService
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: list
                serviceName: reviews
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: get
                kind: VirtualService
                object: reviews
                group: networking.istio.io
                version: v1
        - # Alternative 2: get VirtualService directly
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: get
                kind: VirtualService
                object: reviews
                group: networking.istio.io
                version: v1
        - # Alternative 3: list in bookinfo (agent may omit serviceName)
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: list
      expected_keywords:
        - - reviews
          - v3
          - weight
          - "0"
        - - reviews
          - v3
          - VirtualService
          - routing
      turn_metrics:
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:tool_eval

    - turn_id: fix
      query: >
        Got it. Can you fix the routing so all three versions get equal traffic?
      expected_response: >
        The agent should update the reviews VirtualService to distribute traffic
        equally across all three versions, setting each weight to approximately 33%.
      tool_calls: null
      expected_tool_calls:
        - - tool_name: kiali_manage_istio_config
            arguments:
              namespace: bookinfo
              action: patch
              kind: VirtualService
              object: reviews
              group: networking.istio.io
              version: v1
              data: ".*"
      expected_keywords:
        - - reviews
          - v3
          - weight
        - - reviews
          - v3
          - traffic
        - - reviews
          - fixed
          - routing
      turn_metrics:
        - custom:answer_correctness
        - custom:keywords_eval

  setup_script: ./fix_bookinfo_routing/setup.sh
  cleanup_script: ./fix_bookinfo_routing/cleanup.sh


# ── check_mesh_status ─────────────────────────────────────────────────────────
- conversation_group_id: check_mesh_status
  tag: healthy_env
  description: "Single-turn health check: agent reports the overall mesh and service health."

  turns:
    - turn_id: health_check
      query: >
        Can you check the health of the Bookinfo services and the service mesh?
        Let me know if anything looks degraded or unhealthy.
      expected_response: >
        The agent should report the current health status of the Istio service mesh
        by querying Kiali. It should identify the overall mesh health and list any
        namespaces or services that are degraded or in error state, or confirm that
        all components are healthy.
      tool_calls: null
      expected_tool_calls:
        - # Alternative 1: mesh status tool
          - - tool_name: kiali_get_mesh_status
        - # Alternative 2: traffic graph (agent may use this for health overview)
          - - tool_name: kiali_get_mesh_traffic_graph
              arguments:
                namespaces: bookinfo
      expected_keywords:
        - - bookinfo
        - - healthy
        - - bookinfo
          - service
      turn_metrics:
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:tool_eval

# ── fix_bookinfo_fault_injection ──────────────────────────────────────────────
- conversation_group_id: fix_bookinfo_fault_injection
  tag: fault_injection_bookinfo
  description: "Multi-turn: a 100% fault injection on ratings causes 503 errors. Agent investigates, identifies root cause, and fixes it."

  conversation_metrics:
    - geval:troubleshooting_continuity       # agent references findings across turns
    - deepeval:conversation_relevancy        # agent stays on-topic throughout
    - deepeval:knowledge_retention           # agent remembers evidence from earlier turns
    - deepeval:conversation_completeness     # user's intent (diagnose + fix) was fully addressed

  turns:
    - turn_id: investigate
      query: >
        Some users are seeing errors on the Bookinfo product page — it looks like
        the ratings service is broken. All pods are running and mTLS / auth policies
        are not the issue. All Istio resources are in the 'bookinfo' namespace.
        Can you check the Istio VirtualService routing rules
        for the ratings service and find what's causing the problem?
      expected_response: >
        The agent should investigate the Bookinfo application and report that the
        ratings service is returning errors (HTTP 503). It should identify symptoms
        such as failed requests from the reviews service to ratings, error rates
        visible in the traffic graph, or error messages in pod logs.
      tool_calls: null
      expected_tool_calls:
        - # Alternative 1: traffic graph first
          - - tool_name: kiali_get_mesh_traffic_graph
              arguments:
                namespaces: bookinfo
        - # Alternative 2: logs first
          - - tool_name: kiali_get_logs
              arguments:
                namespace: bookinfo
        - # Alternative 3: mesh status
          - - tool_name: kiali_get_mesh_status
        - # Alternative 4: direct config reads — list by serviceName then get VirtualService
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: list
                serviceName: ratings
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: get
                kind: VirtualService
                object: ratings
                group: networking.istio.io
                version: v1
        - # Alternative 5: list by kind (agent filters by VirtualService kind instead of serviceName)
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: list
                kind: VirtualService
        - # Alternative 6: plain list (no filter) then get VirtualService ratings directly
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: list
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: get
                kind: VirtualService
                object: ratings
                group: networking.istio.io
                version: v1
      expected_keywords:
        - - bookinfo
          - ratings
          - error
        - - bookinfo
          - ratings
          - "503"
      turn_metrics:
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:tool_eval

    - turn_id: root_cause
      query: >
        Can you identify the specific root cause?
      expected_response: >
        The root cause is a fault injection rule in the ratings VirtualService that
        aborts 100% of requests with HTTP 503. The ratings VirtualService in the
        bookinfo namespace contains a fault.abort block configured with httpStatus 503
        and percentage value 100. The agent may explore other potential causes before
        arriving at this conclusion. What matters is that the final diagnosis correctly
        identifies the fault.abort configuration in the ratings VirtualService.
      tool_calls: null
      expected_tool_calls:
        - # Alternative 1: read VirtualService config
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: get
                kind: VirtualService
                object: ratings
                group: networking.istio.io
                version: v1
        - # Alternative 2: list then get
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: list
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: get
                kind: VirtualService
                object: ratings
                group: networking.istio.io
                version: v1
      expected_keywords:
        - - fault injection
          - ratings
          - VirtualService
        - - "503"
          - ratings
          - VirtualService
      turn_metrics:
        - custom:answer_correctness
        - custom:keywords_eval

    - turn_id: fix
      query: >
        Please fix it.
      expected_response: >
        The agent should remove the fault injection rule from the ratings VirtualService,
        either by patching it to remove the fault.abort block or by deleting the
        VirtualService if it was created solely for the fault injection.
      tool_calls: null   # populated at runtime by the API
      expected_tool_calls:
        - # Alternative 1: patch to remove fault injection
          - - tool_name: kiali_manage_istio_config
              arguments:
                namespace: bookinfo
                action: patch
                kind: VirtualService
                object: ratings
                group: networking.istio.io
                version: v1
                data: ".*"
        - # Alternative 2: delete the VirtualService
          - - tool_name: kiali_manage_istio_config
              arguments:
                namespace: bookinfo
                action: delete
                kind: VirtualService
                object: ratings
                group: networking.istio.io
                version: v1
      expected_keywords:
        - - removed
          - ratings
        - - VirtualService
          - ratings
        - - fixed
          - ratings
      turn_metrics:
        - custom:answer_correctness
        - custom:keywords_eval

  setup_script: ./fix_bookinfo_fault_injection/setup.sh
  cleanup_script: ./fix_bookinfo_fault_injection/cleanup.sh

# ── troubleshoot_latency_trace ────────────────────────────────────────────────
- conversation_group_id: troubleshoot_latency_trace
  tag: troubleshoot_latency_trace
  description: "A 3-second delay fault is injected on the ratings service. The agent must identify the latency root cause using traces and fix the delay."

  conversation_metrics:
    - geval:troubleshooting_continuity
    - deepeval:conversation_relevancy
    - deepeval:knowledge_retention
    - deepeval:conversation_completeness

  turns:
    - turn_id: investigate
      query: >
        The Bookinfo product page is loading very slowly — requests to the page
        are taking several seconds. All pods are running fine. Can you investigate
        what is causing the latency and tell me which service is responsible?
      expected_response: >
        The agent should investigate and identify that the ratings service is
        causing significant latency. It should find evidence such as high response
        times visible in the traffic graph, traces showing slow spans on the ratings
        service, or metrics indicating elevated latency for ratings.
      tool_calls: null
      expected_tool_calls:
        - # Alternative 1: traffic graph to spot latency
          - - tool_name: kiali_get_mesh_traffic_graph
              arguments:
                namespaces: bookinfo
        - # Alternative 1b: traffic graph with graphType param
          - - tool_name: kiali_get_mesh_traffic_graph
              arguments:
                namespaces: bookinfo
                graphType: versionedApp
        - # Alternative 2: traces to find slow spans
          - - tool_name: kiali_list_traces
              arguments:
                namespace: bookinfo
        - # Alternative 3: config read to check routing rules
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: list
      expected_keywords:
        - - ratings
          - latency
          - slow
        - - ratings
          - delay
          - seconds
      turn_metrics:
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:tool_eval

    - turn_id: diagnose
      query: >
        Based on your findings, can you check the distributed traces for the
        bookinfo namespace — especially for the ratings service — to pinpoint
        exactly where the 3-second delay is introduced?
      expected_response: >
        The agent should query distributed traces for the bookinfo namespace
        and identify that the ratings service has traces with spans showing
        a fixed delay of approximately 3 seconds. The root cause is a fault
        injection delay rule in the ratings VirtualService configured with
        fixedDelay of 3 seconds on 100% of requests.
      tool_calls: null
      expected_tool_calls:
        - # Alternative 1: list traces scoped to ratings
          - - tool_name: kiali_list_traces
              arguments:
                namespace: bookinfo
                serviceName: ratings
        - # Alternative 2: read ratings VirtualService config
          - - tool_name: kiali_manage_istio_config_read
              arguments:
                namespace: bookinfo
                action: get
                kind: VirtualService
                object: ratings
                group: networking.istio.io
                version: v1
      expected_keywords:
        - - ratings
          - delay
          - fault
        - - ratings
          - "3"
          - VirtualService
      turn_metrics:
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:tool_eval

    - turn_id: fix
      query: >
        Please remove the delay so the ratings service responds at normal speed.
      expected_response: >
        The agent should remove the delay fault injection rule from the ratings
        VirtualService, either by patching it to remove the fault.delay block
        or by deleting the VirtualService entirely.
      tool_calls: null
      expected_keywords:
        - - ratings
          - removed
        - - ratings
          - delay
          - fixed
        - - VirtualService
          - ratings
      turn_metrics:
        - custom:answer_correctness
        - custom:keywords_eval

  setup_script: ./troubleshoot_latency_trace/setup.sh
  cleanup_script: ./troubleshoot_latency_trace/cleanup.sh
