# LightSpeed Evaluation Framework Configuration — Troubleshooting Evals
# OLS backend (api): model sent to OLS /query — must match cluster OLSConfig (e.g. gpt-4o-mini for lseval CR).
# Judge (llm): OpenAI GPT-5-mini for scoring (GPT-5 family; avoid deprecated GPT-4 judge).
#
# api_base is overridden at runtime with the actual OLS cluster URL.
# Requires OPENAI_API_KEY for the judge LLM.

# Core Evaluation Configuration
# Limits concurrent evaluations to avoid OpenAI API rate limiting.
core:
  max_threads: 5

# Judge LLM — scores OLS responses against expected answers
llm:
  provider: "openai"
  model: "gemini-2.5-pro"
  temperature: 0.0
  max_tokens: 5000
  timeout: 300
  num_retries: 3
  cache_enabled: true

# OLS API — the system under test (model must match OLSConfig, e.g. openai_lseval uses gpt-4o-mini)
api:
  enabled: true
  api_base: http://0.0.0.0:8080
  endpoint_type: query
  timeout: 300
  provider: "openai"
  model: "gemini-2.5-pro"
  no_tools: null
  system_prompt: null
  cache_enabled: false
  extra_request_params:
    mode: troubleshooting

embedding:
  cache_enabled: false

# Metrics metadata — registers every metric used in scenario_evals.yaml
metrics_metadata:
  turn_level:
    "custom:answer_correctness":
      description: "Correctness vs expected answer using custom LLM evaluation"
      default: false
    "custom:keywords_eval":
      description: "Validates that keywords are used in the response"
      default: true
      evaluation_params:
        - query
        - response
      evaluation_steps:
        - "Step 1: Check if the response contains keywords related to the query content"
        - "Step 2: Check if the response contains keywords related to the context"
        - "Step 3: Check if the response contains keywords related to the tool calls"
        - "Step 4: Check if the response contains keywords related to the expected answer"
        
    "custom:tool_eval":
      description: "Validates that key tool calls were made (partial match — extra tools allowed)"
      default: false
      ordered: false    # don't enforce call order
      full_match: false # allow extra tool calls beyond what is expected

    "geval:generic_troubleshooting_experience":
      description: "Verify if the agent is performing real evidence-based troubleshooting"
      criteria: |
        The response must be evaluated based on the following points:
        - The agent which is answering is a Troubleshooting Agent, and its ability to be helpful in the troubleshooting must be evaluated
        - The response must include real data evidence retrieved by tool and should not rely on generic or suggestions to address a generic problem
        - The output of the response is the result of one or more tool calls that allow the agent to retrieve the real cluster information
        - Evidences pointing to real cluster resources must be provided otherwise the response is only supposition or suggestions. This is the worst case that must be penalized a lot
      evaluation_params:
        - query
        - response
        - contexts
      evaluation_steps:
        - "Step 1: Check if the response is based on real cluster evidence or is just providing generic suggestions to a problem. In the latter the test MUST fail, otherwise go to next step."
        - "Step 2: Check if the response contains an analysis related to the query content"
        - "Step 3: Check if the response was able to detect an issue related to the user query and the context"
        - "Step 4: Check if the response was able to provide fix for the problem"

  conversation_level:
    "deepeval:conversation_completeness":
      default: false

    "deepeval:conversation_relevancy":
      default: false

    "deepeval:knowledge_retention":
      default: false

    "geval:troubleshooting_continuity":
      description: "Evaluates stateful debugging across turns using context as history"
      evaluation_params:
        - query
        - response
      criteria: |
        The agent must demonstrate 'Stateful Troubleshooting'.
        1. It must reference specific facts found in earlier turns.
        2. It must not repeat tool calls already present in the conversation history.
        3. It must use the current tool output to progress the investigation.
      evaluation_steps:
        - "Step 1: Verify the agent references findings from earlier conversation turns."
        - "Step 2: Check the agent doesn't repeat diagnostic steps already completed."
        - "Step 3: Verify the agent isn't asking for information already provided in the history."
        - "Step 4: Confirm the agent uses real cluster data from the tools to answer the current 'query'."
      rubrics:
        - score_range: [0, 3]
          expected_outcome: "Agent ignores history entirely, restarts the investigation, or provides generic help."
        - score_range: [4, 7]
          expected_outcome: "Agent maintains basic context but repeats questions or diagnostic steps unnecessarily."
        - score_range: [8, 10]
          expected_outcome: "Perfect continuity. References specific historical data to provide a conclusive fix."

# Output Configuration
output:
  output_dir: "./eval_output"
  base_filename: "evaluation"
  enabled_outputs:
    - csv
    - json
  csv_columns:
    - "conversation_group_id"
    - "turn_id"
    - "metric_identifier"
    - "score"
    - "threshold"
    - "result"
    - "reason"
    - "query"
    - "response"
    - "tool_calls"
    - "expected_tool_calls"
    - "execution_time"

# Visualization settings
visualization:
  figsize: [12, 8]
  dpi: 300
  enabled_graphs:
    - "pass_rates"
    - "score_distribution"
    - "conversation_heatmap"
    - "status_breakdown"

# Environment Variables
environment:
  DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
  DEEPEVAL_DISABLE_PROGRESS_BAR: "YES"
  LITELLM_LOG: ERROR

# Logging Configuration
logging:
  source_level: INFO
  package_level: ERROR
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  show_timestamps: true
  package_overrides:
    httpx: ERROR
    urllib3: ERROR
    requests: ERROR
    matplotlib: ERROR
    LiteLLM: WARNING
    DeepEval: WARNING
    ragas: WARNING
